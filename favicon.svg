<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE000" />
      <stop offset="100%" stop-color="#FF8C00" />
    </linearGradient>
  </defs>
  <!-- Background with gold border -->
  <rect width="62" height="62" x="1" y="1" rx="16" fill="#080808" stroke="url(#goldGrad)" stroke-width="1.5" />
  <!-- Premium Monogram S -->
  <text x="32" y="45" font-family="'Outfit', 'Inter', 'Arial Black', sans-serif" font-size="38" font-weight="900" text-anchor="middle" fill="url(#goldGrad)" style="filter: drop-shadow(0px 2px 4px rgba(255,224,0,0.15));">S</text>
  <!-- Tech Accent Dot -->
  <circle cx="48" cy="16" r="3.5" fill="#FFE000" style="filter: drop-shadow(0px 0px 3px #FFE000);" />
</svg>
